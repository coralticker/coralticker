<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CTK-164 — F8 reveal/strike-draw drill-in reel frame — 9:16 production reference</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=IBM+Plex+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<!-- The animated sibling of reel-frame-f8-superlative.html. The composition + the
     wordmark/card/body/stat/row CSS are the SAME static F8 card; the held end-frame
     IS that card. seekTo(i) drives a CONTENT animation (reveal + em-dash draw +
     price strike-draw) as a build-up to the held frame — it only toggles
     opacity / clip / the strike width, never the row TEXT. The .row markup is the
     UNCHANGED data_card.format_data_row_html output, so its textContent is
     frame-invariant and equals data_row.format_data_row() byte-for-byte at every
     frame incl. the held end (the INV-01 parity gate). -->
<style>
  :root{--cream:#F5F1EA;--ink:#1A1A1A;--forest:#1B5E20;}
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--cream);}

  /* 9:16 frame: the 1080x1080 square sits centered, 420px cream above + below */
  .frame{width:1080px;height:1920px;background:var(--cream);position:relative;overflow:hidden;}
  .card{position:absolute;left:0;top:420px;width:1080px;height:1080px;background:var(--cream);
        padding:104px;display:flex;flex-direction:column;}

  /* The brand anchor — present and STILL from frame 0; it never animates. */
  .wordmark{font-family:'IBM Plex Sans',sans-serif;font-size:40px;font-weight:400;letter-spacing:-.01em;line-height:1;}
  .wordmark .c{font-weight:700;}
  .wordmark .dot{color:var(--forest);font-weight:700;}

  .body{flex:1;display:flex;flex-direction:column;justify-content:center;}

  .stat{font-family:'IBM Plex Sans',sans-serif;font-weight:400;font-size:66px;line-height:1.16;letter-spacing:-.02em;max-width:880px;margin:0;}
  .stat .name,.stat .num{font-weight:700;}   /* near-black — the % is not a forest job */

  .row{font-size:40px;line-height:1.55;max-width:880px;margin:48px 0 0;}
  .row .lab{font-family:'IBM Plex Sans',sans-serif;font-weight:700;color:var(--ink);}
  .row .val{font-family:'IBM Plex Mono',monospace;font-weight:400;color:var(--ink);}
  .row .sep{font-family:'IBM Plex Sans',sans-serif;font-weight:400;color:var(--forest);}
  .row .struck{font-family:'IBM Plex Mono',monospace;font-weight:400;color:var(--ink);}
  .row .new{font-family:'IBM Plex Mono',monospace;font-weight:700;color:var(--forest);}
  .row em{font-style:italic;}

  /* --- Animation layer (the only departure from the static F8 CSS) --- */
  /* Reveal targets start hidden; seekTo fades them in (opacity-only — every span
     is present and occupies its final layout from frame 0, so the row never
     reflows; elements reveal IN PLACE in reading order). The wordmark is NOT a
     reveal target — it stays visible from frame 0. */
  .stat{opacity:0;}
  .row .lab,.row .struck,.row .new,.row .val{opacity:0;}

  /* The forest em-dash DRAWS left-to-right (width 0->100%, canon L196): inline-block
     so clip-path applies; the right inset shrinks 100%->0 to wipe it in from the
     left. clip is paint-only, so the span still holds its layout width from frame 0. */
  .row .sep{display:inline-block;vertical-align:baseline;clip-path:inset(0 var(--sep-clip,100%) 0 0);}

  /* The price strike DRAWS left-to-right (canon L197): the static F8's
     text-decoration:line-through is replaced by a near-black bar whose width
     animates 0->100%, so the line can be drawn. At 100% it reads as the same 2px
     strikethrough; the text is untouched (the ::after carries no text — get_text
     parity holds). */
  .row .struck{position:relative;text-decoration:none;}
  .row .struck::after{content:"";position:absolute;left:0;top:50%;height:2px;
       width:var(--strike,0%);background:var(--ink);transform:translateY(-50%);}
</style>
</head>
<body>
  <div class="frame">
    <div class="card">
      <div class="wordmark"><span class="c">coral</span>ticker<span class="dot">.</span></div>
      <div class="body">
        <p class="stat">Biggest drop this week: <span class="name">{{STAT_NAME}}</span>, down <span class="num">{{STAT_PCT}}%</span>.</p>
        <p class="row">{{DATA_ROW}}</p>
      </div>
    </div>
  </div>
  <script>
    // The reveal/strike-draw timeline. SCHEDULE is the Python-authored frame
    // windows (so the sample-gate timings live in data_card.py, tunable + reported)
    // — each [start, end] in frames; countUp/pct drive the headline %. seekTo(i)
    // maps frame i to each element's reveal progress (ease-out cubic, no
    // spring/bounce/fly-in/blur — canon L198), toggling opacity / clip / strike
    // width only. At i >= build end every progress is 1 -> the held end-frame.
    var S = {{SCHEDULE}};
    var card = document.querySelector('.card');
    var stat = card.querySelector('.stat');
    var row = card.querySelector('.row');
    var labs = row.querySelectorAll('.lab');
    var priceLab = labs[0], listedLab = labs[1];
    var oldP = row.querySelector('.struck');
    var newP = row.querySelector('.new');
    var sep = row.querySelector('.sep');
    var val = row.querySelector('.val');

    function ease(p){ return p <= 0 ? 0 : (p >= 1 ? 1 : 1 - Math.pow(1 - p, 3)); }

    window.seekTo = function (i) {
      function prog(w){ if (i <= w[0]) return 0; if (i >= w[1]) return 1; return ease((i - w[0]) / (w[1] - w[0])); }

      // Beat 1 — headline plain-reveals (the % is a settled fact; the count-up
      // variant was dropped 2026-06-18, count-up stays on the warming card only).
      stat.style.opacity = prog(S.hl);

      // Beat 2 — the Price FIELD reveals IN reading-order position via the
      // strike-draw (canon L197: the strike-draw REPLACES the plain reveal on the
      // Price field): "Price." + old price fade in, hold un-struck, the strike draws
      // through the old price, then the new price reveals. The value appears once.
      var pp = prog(S.price);
      priceLab.style.opacity = pp;
      oldP.style.opacity = pp;
      oldP.style.setProperty('--strike', (prog(S.strike) * 100) + '%');
      newP.style.opacity = prog(S.newp);

      // Beat 3 — the forest em-dash draws L->R, THEN the Listed field reveals.
      sep.style.setProperty('--sep-clip', (100 - prog(S.sep) * 100) + '%');
      var lp = prog(S.listed);
      listedLab.style.opacity = lp;
      val.style.opacity = lp;
    };
    window.seekTo(0);   // frame 0: only the wordmark + forest dot are visible
  </script>
</body>
</html>
