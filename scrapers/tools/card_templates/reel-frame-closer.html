<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CTK-173 — carousel closer card — 9:16 production reference</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=IBM+Plex+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<!-- The F7/F9 carousel CLOSER card (final slide). B-path owned cream graphic, reusing
     the wordmark chrome. STATIC — no count-up, no reveal, no data row; one on-image
     line (caller-owned copy). seekTo is a no-op so rasterize_sequence holds the same
     frame for the whole closer beat (the carousel concat path stays uniform — every
     slide is (html, total_frames) through render_sequence).

     The on-image line is brand copy (caller passes the confirmed string). The "link in
     bio" string is caption-only canon and must NOT appear here. The wordmark sits
     top-left (the brand anchor, still) and the line is centered in the body, so the
     two never visually stack. -->
<style>
  :root{--cream:#F5F1EA;--ink:#1A1A1A;--forest:#1B5E20;}
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--cream);}

  /* 9:16 frame: the 1080x1080 square sits centered, 420px cream above + below */
  .frame{width:1080px;height:1920px;background:var(--cream);position:relative;overflow:hidden;}
  .card{position:absolute;left:0;top:420px;width:1080px;height:1080px;background:var(--cream);
        padding:104px;display:flex;flex-direction:column;}

  /* The brand anchor — present and still (canon: the wordmark never animates). */
  .wordmark{font-family:'IBM Plex Sans',sans-serif;font-size:40px;font-weight:400;letter-spacing:-.01em;line-height:1;}
  .wordmark .c{font-weight:700;}
  .wordmark .dot{color:var(--forest);font-weight:700;}

  .body{flex:1;display:flex;flex-direction:column;justify-content:center;}

  /* The closer line — near-black Plex Sans; the URL token is bold for legibility (a
     count/URL is not one of forest's five jobs, so no forest treatment). */
  .closer{font-family:'IBM Plex Sans',sans-serif;font-weight:400;font-size:64px;line-height:1.16;letter-spacing:-.02em;color:var(--ink);max-width:880px;margin:0;}
  .closer .url{font-weight:700;}
</style>
</head>
<body>
  <div class="frame">
    <div class="card">
      <div class="wordmark"><span class="c">coral</span>ticker<span class="dot">.</span></div>
      <div class="body">
        <p class="closer">{{LINE_HTML}}</p>
      </div>
    </div>
  </div>
  <script>
    // Static closer: seekTo is a no-op (every frame identical), so the closer holds
    // for its whole beat. rasterize_sequence requires a seek fn (a missing/throwing
    // one fails loud), so it is present and inert rather than absent.
    window.seekTo = function (i) {};
    window.seekTo(0);
  </script>
</body>
</html>
