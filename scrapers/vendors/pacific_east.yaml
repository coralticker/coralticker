# Pacific East Aquaculture scraper config (CTK-024).
#
# Authoritative platform/method fields live on the vendors row (CTK-028 seed.sql,
# vendor_id=1). YAML carries scrape-tuning per arch §2.3 — values that may change
# without a code edit (delay, page size, max pages, hash anchor, originator prefix).
# DB row wins on conflict.

slug: pacific_east
platform: shopify
base_url: https://pacificeastaquaculture.com

# D1 = (a) /products.json standard Shopify endpoint per CTK-024
# pre-implementation review 2026-05-03 + curl smoke (HTTP 200, Content-Type:
# application/json, powered-by: Shopify confirmed). Fallback to /collections
# BS4 parsing was the (b) lean only on smoke-failure; smoke passed.
products_path: /products.json

# Page size at Shopify's max (250) — fewer round-trips for 500-2000 catalog.
# Two pages cover steady-state; the parser short-circuits on the first
# under-full page.
page_size: 250

# D2 = (b) request_delay_sec: 2 per CTK-024 pre-implementation review 2026-05-03.
# Matches arch §2.3 example + §2.5 typical (2s). 8-page worst-case scrape =
# ~16s well inside 10-min workflow timeout. Bump per arch §2.4 retry-policy
# outcome only if 429s appear in 7-day validation window.
request_delay_sec: 2

# Belt-and-suspenders ceiling. PE's 500-2000 catalog at 250/page = 2-8 pages;
# 30 is room for catalog growth without re-tuning.
max_pages: 30

# Arch §2.6 Shopify variant: hash sorted key set of first product object.
# F5 verification at parse_shopify.py write — sorted() applied before SHA so
# Shopify JSON-key emission-order changes don't flip the hash spuriously.
# Empirical anchor (smoke 2026-05-03): 12 keys = body_html, created_at,
# handle, id, images, options, product_type, published_at, tags, title,
# updated_at, variants, vendor.
hash_anchor: first_product_keys

# D3 = (a) originator_prefix: null per CTK-024 pre-implementation review +
# title-shape verification 2026-05-03. PE titles use "Coral Colony - <Genus>
# - <description> WYSIWYG" pattern; no PE/Pacific East prefix to strip.
# Stage 4 (Normalize) does no prefix work; matcher §3.4 stage 3 is a no-op
# for this vendor.
originator_prefix: null

# cohort_oos_at_persist: true — CTK-105 D-4 (Phase 2 close-window; aggregator
# trust-floor remediation; HARD R2R-launch gate per Jon 2026-06-01). Q-4-NEW
# path (a) batch member; /lead-backend signed off PE sample-check 2026-06-02
# at 10/10 delisted (BLOCK A top-5 by price + BLOCK B random-5, seed=42). D-3
# would-flip rowset = 52 PARTITION-A (CTK-094 fold #4 excludes 19 PARTITION-B
# per CTK-107 D-1 partition extension Session 3a). Expected post-flip
# listings_oos ~50 (Session 3a recalibrated anchor); halt-and-surface fires
# materially below per CTK-094 §3.5 partial-success signals. PE = hourly
# cadence; cohort-OOS pass fires on next scheduled scrape.
cohort_oos_at_persist: true

# CTK-037 category-filter: coral + anemones + clams (per D1 lean (a) locked
# 2026-05-10 by Jon — keep named-anemone + named-clam seed-list coverage
# intact; ECC Sherman/Rainbow BTA + ORA Maxima Clam Ultra Gold all match here).
# Empirical 2026-05-10 full-catalog /products.json | jq walk; non-coral
# product_types (TankRaised fish, Inverts, Live Rock, Saltwater Fish, Macro
# Algae, Live Food, gift cards) denied by allowlist default. Tag-denylist
# empty — product_type alone discriminates at PE.
category_filter:
  product_type_allowlist:
    - Acropora            # SPS, 206 items (CTK-037 2026-05-10)
    - Anemone             # 309 items; per seed-list ECC Sherman/Rainbow BTA (CTK-037 D1 2026-05-10)
    - Blastomussa         # LPS, 122 items (CTK-037 2026-05-10)
    - Colony              # coral colonies, 1304 items (CTK-037 2026-05-10)
    - Euphyllia           # LPS, 476 items (CTK-037 2026-05-10)
    - Gorgonian           # soft-coral lineage, 11 items (CTK-037 2026-05-10)
    - Grow Out            # coral grow-out packs, 24 items (CTK-037 2026-05-10)
    - Maxima Clam         # 458 items; per seed-list ORA Maxima Clam Ultra Gold (CTK-037 D1 2026-05-10)
    - Under 25            # coral price-bucket label, 23 items (CTK-037 2026-05-10)
    - Weekly Special      # 6/6 real coral exhaustive sample + fresh-catalog tag dist 100% coral-typed (CTK-037 Session 4.5 2026-05-11)
    - WYSIWYG             # WYSIWYG-photographed coral, 1797 items (CTK-037 2026-05-10)
    - WYSIWYG Frags       # 2-item typo variant, kept for coverage (CTK-037 2026-05-10)
  # CTK-041 tag_denylist v1 (2026-05-14): invert-shape tags catching Weekly
  # Special bucket rotation. Allowlist entry locked CTK-037 Session 4.5
  # 2026-05-11 on a snapshot 100%-coral sample; vendor rotated bucket to
  # inverts within 3 days (Banded Trochus / Pom Pom Crab / Sea Hare /
  # Astrea Algae Mowers / Nerites / Nassarius / Strawberry Conch).
  # Sales-bucket discipline per open-items.md Open + memory
  # feedback_rotating_bucket_allowlist.md.
  #
  # CTK-041 tag_denylist v2 (2026-05-21): 4 snail-species belt-and-suspenders
  # entries (Cerith / Conch / Nassarius / Nerite) per open-items.md L74 fold
  # trigger. The 2026-05-18 eyeball trigger was a stale-render artifact
  # (Jon disambiguation), not a real leak through the v1 list — but the
  # discipline-rule case for belt-and-suspenders against tag-shape drift
  # mid-rotation (a Weekly Special row tagged Nassarius alone without the
  # Snail / Inverts umbrella co-tag would have slipped v1) is sound;
  # forward-binding only, no retroactive backfill.
  tag_denylist:
    - Algae Muncher       # Astrea Algae Mowers (CTK-041 2026-05-14)
    - Astrea Snails       # snail (CTK-041 2026-05-14)
    - Cerith              # snail belt-and-suspenders (CTK-041 2026-05-21)
    - Conch               # snail belt-and-suspenders (CTK-041 2026-05-21)
    - Crab                # Pom Pom Crab (CTK-041 2026-05-14)
    - Inverts             # umbrella tag (CTK-041 2026-05-14)
    - Nassarius           # snail belt-and-suspenders (CTK-041 2026-05-21)
    - Nerite              # snail belt-and-suspenders (CTK-041 2026-05-21)
    - Snail               # Nerites/Nassarius/Strawberry Conch (CTK-041 2026-05-14)
    - Trochus             # Banded Trochus (CTK-041 2026-05-14)
  # CTK-107 D-2-quater (2026-06-02) fleet-wide defensive chaeto/macroalgae
  # add per Jon's "filter chaeto from all vendors just to be safe" 2026-06-01.
  # No active leak on PE today (in_stock=true scan returned 0 chaeto rows)
  # but Shopify empty-tag bypass class is structurally identical to BC/POTO/
  # Vivid; forward-binding deny here.
  title_denylist:
    - Chaeto              # canonical + Chaetomorpha substring catch
    - Cheato              # misspelling forward-binding
    - Macroalgae          # generic
    - Macro Algae         # space-separated variant
