# World Wide Corals scraper config (CTK-025).
#
# Authoritative platform/method fields live on the vendors row (CTK-028 seed.sql,
# vendor_id=2). YAML carries scrape-tuning per arch §2.3 — values that may change
# without a code edit (delay, page size, max pages, hash anchor, originator prefix).
# DB row wins on conflict.

slug: wwc
platform: shopify
base_url: https://worldwidecorals.com

# Standard Shopify endpoint; smoke-checked 2026-05-04 — HTTP 200,
# Content-Type: application/json; charset=utf-8, 4615 products across 19
# pages of 250 (page 20 returned 0 products, terminating pagination).
products_path: /products.json

# Page size at Shopify's max (250) — fewer round-trips for the empirical
# 4615-product catalog. 19 pages cover the catalog; the parser short-
# circuits on the first under-full page.
page_size: 250

# D1 (CTK-025 lead-review pre-impl 2026-05-04): inherits PE's empirical
# request_delay_sec=2 lock. 4615 products / 250 per page = 19 pages × 2s =
# ~38s total scrape time, well inside 60-min workflow timeout. Hourly cadence
# absorbs delay easily. Bump per arch §2.4 retry-policy outcome only if
# 429s appear in the 24-72hr observation window (framework inheritance test
# point (b) in plan.md).
request_delay_sec: 2

# Belt-and-suspenders ceiling. WWC's 4615-product catalog at 250/page = 19
# pages today; 30 leaves room for catalog growth without re-tuning.
max_pages: 30

# Arch §2.6 Shopify variant: hash sorted key set of first product object.
# Same hash_anchor as PE per parse_shopify.py shape stability across CTK-024
# Sessions 1-5. F5 fold (sort-before-hash) prevents Shopify JSON key
# emission-order changes from spuriously flipping the sentinel.
hash_anchor: first_product_keys

# D3 (CTK-025 lead-review pre-impl 2026-05-04): originator_prefix='wwc'.
# Title-shape spot-check 2026-05-04 inspected first 20 titles from
# /products.json: 14 of 20 dropped the "WWC " prefix (e.g., "Hypnotic Aussie
# Lord", "Dragon Soul Torch", "Maui Sunset Rhodactis Mushroom"); 6 of 20
# carried it (e.g., "WWC Mango Tango Echinata", "WWC Soursop Goniopora").
# Mixed shape is exactly the case where matcher §3.4 stage 3 (canonical-
# implicit-prefix) earns its keep — synthesizes "wwc " + normalized_title
# against canonical patterns 1-2 for the 70% that drop the prefix; the
# prefix-bearing 30% match at stage 1 or 2 directly without synthesis.
# Calibration of the cascade against real WWC titles is CTK-002.
originator_prefix: wwc

# cohort_oos_at_persist: true — CTK-105 D-4 (Phase 2 close-window; aggregator
# trust-floor remediation; HARD R2R-launch gate per Jon 2026-06-01). WWC is
# the last vendor in the per-vendor opt-in sequence (largest blast-radius;
# standalone session after the PE/JF/Vivid/RC batch 24h soak cleared D-5 on
# all four). D-2 under-intake hypothesis closed durably across two diagnostic
# runs: 2026-06-01 20/20 delisted + 2026-06-02 19/20 delisted + 1/20
# OOS-at-vendor Merch sticker (parser_filter_edge), 0/40 under_intake.
# Expected first post-flip listings_oos ~1,228 (fresh pre-flip stale baseline
# 2026-06-03; was ~1,191 at the 2026-06-02 re-baseline — smooth delisting
# churn, listings_seen declined in step). Full-PARTITION-A flip per the D-2
# 39/40 aggregate; small parser-filtered residual excluded per CTK-094 fold #4.
cohort_oos_at_persist: true

# CTK-037 category-filter: coral product_types only (per D1 lean (a) — WWC
# carries no anemone/clam product_types). Empirical 2026-05-10 full-catalog
# /products.json | jq walk; Fish (444 items, ~23% of catalog) cleanly denied
# by its own product_type. D3 lean (a) locked 2026-05-10 by Jon: Doorbuster +
# Custom Bundle denied (~9-item loss, mixed-bag safety). Tag-denylist empty.
category_filter:
  product_type_allowlist:
    - CTO Corals          # 1/1 real coral (LPS Chalice) per CTK-037 Session 4.5 2026-05-11
    - Featured Livestock  # WWC feature drops, 2 items (CTK-037 2026-05-10)
    - Frag                # coral frags, 726 items (CTK-037 2026-05-10)
    - Frag-PoS            # point-of-sale coral frags, 7 items (CTK-037 2026-05-10)
    - Live Sale Coral     # 1 item (CTK-037 2026-05-10)
    - Pack                # coral packs, 18 items (CTK-037 2026-05-10)
    - VP Colonies         # VP-collection colonies, 3 items (CTK-037 2026-05-10)
    - VP Frags            # VP-collection frags, 81 items (CTK-037 2026-05-10)
    - Wholesale Frag      # wholesale coral frags, 66 items (CTK-037 2026-05-10)
    - WWC Colony          # WWC-house colonies, 65 items (CTK-037 2026-05-10)
    - WYSIWYG Frag        # WYSIWYG-photographed frags, 159 items (CTK-037 2026-05-10)
  tag_denylist: []  # WWC not needed: Fish has its own product_type (CTK-037 2026-05-10)
  # CTK-107 D-2-quater (2026-06-02) fleet-wide defensive chaeto/macroalgae
  # add per Jon's "filter chaeto from all vendors just to be safe" 2026-06-01.
  # No active leak on WWC today (in_stock=true scan returned 0 chaeto rows)
  # but Shopify empty-tag bypass class is structurally identical to BC/POTO/
  # Vivid; forward-binding deny here.
  title_denylist:
    - Chaeto              # canonical + Chaetomorpha substring catch
    - Cheato              # misspelling forward-binding
    - Macroalgae          # generic
    - Macro Algae         # space-separated variant
    # CTK-119 D-1 (2026-06-04): promo/POS/BOGO tail of the available-with-
    # dead-link class — 7 rows feed-published with HEAD-404 retail routes
    # (full evidence: CTK-119 head-sweep-2026-06-04.txt). Exact-compound
    # entries, zero false-kill by construction; family patterns (BOGO / POS /
    # Special / Build A) stay unlocked pending the D-2 multi-day rotation
    # sample per the rotating-bucket rule.
    - Acro Frag POS                   # id=15744
    - Special Sale - Frag             # id=15770
    - BOGO Beginner SPS Frag          # id=15771
    - $10 GSP Frag                    # id=15772
    - Favia/Favites BOGO              # id=15781
    - May $25 Build A Monti Pack      # id=15782
    - Rainbow Hammer January Special  # id=15800
  # CTK-119 D-1 (2026-06-04): WWC wholesale/live-sale channel prefix — 56 of
  # 523 user-facing rows carried title-initial 'WS - ' with dead retail routes
  # (in-feed + in_stock=true + storefront HEAD-404; published via a non-retail
  # channel). ANCHORED axis, not a substring entry: substring 'ws - ' would
  # silently false-kill any future title with word-final "ws" before " - "
  # ("Rainbows - ...", "Jaws - ..."). Mechanism decision at CTK-119 plan.md
  # review-fold #1.
  title_denylist_prefix:
    - "WS - "             # trailing space intentional; quoted to preserve it

# CTK-041 auction_detection: null-out current_price on auction listings per
# Jon 2026-05-14 directive. Auctions stay visible in /new (rendered as
# "price on request" via formatPrice(null) at components/listing-card.tsx:39-42).
# Distinct rendering (auction-marker, current-bid display, lead-verb shift)
# is Phase 2 work — graduated to CTK-042 DRAFT 2026-05-14.
# Tag detection is primary signal; slug_suffix is sanity log-warning.
auction_detection:
  tags:
    - Auction
    - active_bidding
    - on_auction
  slug_suffix: "-auc"  # belt-and-suspenders sanity log-warning when tag detection fires
