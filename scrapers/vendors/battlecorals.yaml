  product_type_allowlist:
    - ""                          # 121 items; mostly Battlebox grab-bags + house lineages + grow-out entries; ~1 non-coral leak (BTA anemone) excluded by frontend has_image filter; per CTK-027 Session 5 Q-8 path (a) (2026-05-25)
