# Top Shelf Aquatics scraper config (CTK-026).
#
# Authoritative platform/method fields live on the vendors row (CTK-028 seed.sql,
# vendor_id=3). YAML carries scrape-tuning per arch §2.3 — values that may change
# without a code edit (delay, page size, max pages, hash anchor, originator prefix).
# DB row wins on conflict.

slug: tsa
platform: shopify
base_url: https://topshelfaquatics.com

# Standard Shopify endpoint; smoke-checked 2026-05-07 — HTTP 200,
# Content-Type: application/json; ~3000-product catalog (vendor-scan §3
# "3,000 stunning corals"; first-page-at-250 returns 250 products with
# 'products' array populated). Pagination terminates on first under-full
# page per parse_shopify.py page loop.
products_path: /products.json

# Page size at Shopify's max (250) — fewer round-trips for the ~3000-product
# catalog. ~12 pages cover the catalog steady-state; the parser short-
# circuits on the first under-full page.
page_size: 250

# D1 (CTK-026 plan §Decision space + /lead-backend pre-impl review 2026-05-07):
# inherits PE+WWC empirical request_delay_sec=2 lock. ~3000 products / 250 per
# page = ~12 pages × 2s = ~24s total scrape time, well inside the 60-min
# workflow timeout. Sat/Sun drop-window cadence at TSA-side traffic peak is
# the unverified 429-surface; first-Sat+Sun-drop-window cron firing post-
# cold-start is the empirical validation. Bump to 3-4s per arch §2.4 retry-
# policy outcome only if 429s appear in the observation window.
request_delay_sec: 2

# Belt-and-suspenders ceiling. TSA's ~3000-product catalog at 250/page = ~12
# pages today; 30 leaves room for catalog growth without re-tuning.
max_pages: 30

# Arch §2.6 Shopify variant: hash sorted key set of first product object.
# Same hash_anchor as PE+WWC per parse_shopify.py shape stability across
# CTK-024 Sessions 1-5 + CTK-025 framework inheritance test (c). F5 fold
# (sort-before-hash) prevents Shopify JSON key emission-order changes from
# spuriously flipping the sentinel. Empirical anchor (smoke 2026-05-07): 13
# keys = body_html, created_at, handle, id, images, options, product_type,
# published_at, tags, title, updated_at, variants, vendor (matches PE+WWC).
hash_anchor: first_product_keys

originator_prefix: tsa  # CTK-026 pre-impl spot-check: 89/250 (~36%) carry "TSA " prefix (page 1 limit=250); matches WWC ~30% pattern that locked CTK-025 to 'wwc'. First-20 sample at 5% was recency-skewed (fish-heavy) per /backend-engineer 2026-05-07. Aligns with arch §3.4 stage 3 + decision #23 (TSA absent from null-prefix vendor list).

# cohort_oos_at_persist: true — CTK-105 D-4 (Phase 2 close-window; aggregator
# trust-floor remediation; HARD R2R-launch gate per Jon 2026-06-01). TSA is
# the canary in the per-vendor opt-in sequence per plan §D-4 (TSA -> BC/PE/JF/UC
# batch -> Vivid/RC fold -> WWC last). D-2 (WWC) cleared 2026-06-01 (20/20
# delisted); D-3 --classify per-vendor sample-check cleared TSA at 10/10
# delisted (under_intake=0). Q-2 ratified by /lead-backend 2026-06-01 — opt-in
# safety gate is under_intake=0 fleet-wide, not the strict >=9/10 cut. Post-
# flip TSA scrape expected listings_oos ~196 (D-3 dry-run 202 minus 6 CTK-104
# Session 1 manual flips); CTK-104 results.md gets a one-time spike note on
# commit-land so D-5 cycles 2+3 readings aren't misread as scraper regression.
cohort_oos_at_persist: true

# CTK-037 category-filter: Livestock product_type covers both coral + fish
# (~96% coral / ~4% fish by tag at full-catalog 2026-05-10). tag_denylist
# rejects fish within Livestock. Anemone tag (20 within Livestock) NOT in
# denylist — per seed-list inclusion (ECC Sherman/Rainbow BTA, D1 lean (a)).
# Equipment lives in Aquarium Supplies / Oversized / Drop shipped — denied
# by allowlist default. D1 + D2 + D3 leans locked 2026-05-10 by Jon.
# CTK-041 Session 2 tag_denylist extension: 6 non-coral tags (algae-utility
# inverts + bio media umbrella) added 2026-05-21 per Jon-eyeball /vendor/tsa
# 2026-05-19 (algae + bio media surfaced inside Livestock allowlist) +
# 17-page live walk empirical (2,731 Livestock rows; ~120 catchable
# non-coral; ~4.4% leak rate). Sales-bucket / rotating-content discipline
# per open-items.md Open + memory feedback_rotating_bucket_allowlist.md.
#
# CTK-104 (2026-06-01) — structural discriminator + equipment gate. Fourth
# fish-leak pass per CTK-037 → CTK-041 → CTK-095 → CTK-104 cadence
# (Borbonius Anthias / Copperband + Yellow Longnose Butterfly / Magnificent
# Foxface / Harlequin Basslet leaked in_stock pre-R2R-launch). Per-genus
# enumeration is whack-a-mole — TSA tags every fish with a reef-safety
# rating tag corals never carry. D-1 adds the rating family
# (Reef Safe / Reef Safe Caution / Non Reef Safe / Not Reef Safe /
# EXPERT ONLY / Predator) as the primary structural fish gate. D-2 adds
# Aquariums / All-in-One Aquariums / Jellyfish Art to plug the
# empty-product_type allowlist entry (kept for ~62 blank-PT coral recovery
# per CTK-037 Q-8 path (a)) against jellyfish-tank equipment leaks (3 in
# stock 2026-06-01: Kreisel 10 / Kreisel 15 / Jelly Cylinder 5). D-1A:
# retain the prior per-genus fish entries as belt-and-suspenders alongside
# the structural family — additive cost is zero, drift insurance if TSA
# ever ships a fish without a reef-safety tag.
#
# D-4 structural-taxonomy classification (CTK-104 plan §D-4 + open-items L56
# rotating-bucket discipline): reef-safety rating tags are stable Shopify-
# platform metadata TSA emits on every fish row (not a vendor-rotated sales
# bucket). 0-false-kill verification at live full-catalog scan 2026-06-01:
# 83 in-stock products carry a reef-safety tag (filtered to allowlisted
# product_type), 0 coral, 0 anemone. Three jellyfish tanks under blank-PT
# × equipment-tag filter (D-2 pre-lock verify); 0 coral. Multi-day
# re-sample window (3 cycles) per Jon directive belt-and-suspenders,
# despite structural-taxonomy classification not strictly binding the
# rotating-bucket multi-day requirement.
category_filter:
  product_type_allowlist:
    - ""                  # empty product_type bucket; 9/10 sample real coral (Blastomussa/Acropora/Chalice/Acan) per CTK-037 Session 4.5; remaining ~7 rows imageless test-data per /lead-backend spot-check 2026-05-11 (frontend has_image filter excludes); ~62 real-coral recovery; Q-8 path (a) (CTK-037 Session 5 2026-05-11)
    - Coral-POS           # 1/1 real coral (SPS Cap) per CTK-037 Session 4.5 2026-05-11
    - Livestock           # 2408 items; coral + fish + anemones (CTK-037 2026-05-10)
  # CTK-095 Axis 2 tag_denylist v3 (2026-05-30): 7 additional entries for
  # clam + fish leaks surfaced at Jon /vendor/tsa eyeball 2026-05-30 + cross-
  # vendor fleet sweep. Clam catches Maxima / Hippopus / Squamosa / Derasa
  # rows under Livestock allowlist (12 leaks; TSA out-of-scope for clams
  # distinct from PE which keeps Maxima per CTK-037 D1 seed-list coverage).
  # Hawkfish + Wrasse + Wrasses + Goby + Tilefish + Filefish catch the 4 fish
  # leaks (Arc Eye Hawkfish, Common Cleaner Wrasse, Blue Gudgeon Dartfish,
  # Aiptasia Eating Filefish, Purple Tilefish). Goby is the umbrella tag for
  # Dartfish + Tilefish at TSA (no Dartfish/Tilefish-specific tags observed
  # in live walk 2026-05-30); singular+plural Wrasse pairs for defensive
  # coverage. Sticker/Hoodie/T-Shirt PT='Aquarium Supplies' already
  # excluded by allowlist; no defensive tag add needed.
  #
  # CTK-104 (2026-06-01): 6 reef-safety tag family entries + 3 equipment
  # entries added below per D-1 + D-2. Per-genus fish + invert / bio-media
  # entries retained per D-1A belt-and-suspenders. Final 28 = 6 reef-safety
  # (D-1) + 3 equipment (D-2) + 12 per-genus fish + 7 invert / bio-media.
  tag_denylist:
    - Algae Eater         # algae-utility inverts, 26 items (CTK-041 2026-05-21)
    - All-in-One Aquariums # equipment — jellyfish-tank leak via blank-PT allowlist (CTK-104 D-2 2026-06-01)
    - Angelfish           # fish, 18 items in Livestock (CTK-037 2026-05-10)
    - Aquariums           # equipment — jellyfish-tank leak via blank-PT allowlist (CTK-104 D-2 2026-06-01)
    - Beginner Fish       # fish, 31 items in Livestock (CTK-037 2026-05-10)
    - Biomedia            # bio-media seeded substrate ("Wild Reef Pre-Seeded Bio Media"); empty-tag bypass closed via brand tag (CTK-107 D-2-tris 2026-06-01 close-gate eyeball-fail)
    - Clam                # clam (TSA out-of-scope per CTK-095 Axis 2 2026-05-30; 12 Maxima/Hippopus/Squamosa/Derasa leaks in_stock)
    - Clownfish           # fish, 19 items in Livestock (CTK-037 2026-05-10)
    - EXPERT ONLY         # reef-safety rating family — fish gate per CTK-104 D-1 structural discriminator (2026-06-01)
    - Filefish            # fish (Aiptasia Eating Filefish; CTK-095 Axis 2 2026-05-30)
    - Goby                # fish umbrella (catches Dartfish + Tilefish at TSA per live walk; CTK-095 Axis 2 2026-05-30)
    - Hawkfish            # fish (Arc Eye Hawkfish; CTK-095 Axis 2 2026-05-30)
    - Invert              # umbrella tag catches Shrimp/Crab/Urchin/Starfish/Snail/Lobster/Chiton/Sand Sifter/Cucumber co-carry, 77 items (CTK-041 2026-05-21)
    - Jellyfish Art       # equipment — jellyfish-tank leak via blank-PT allowlist (CTK-104 D-2 2026-06-01)
    - Live Rock           # bio-media substrate, 1 item (CTK-041 2026-05-21)
    - Macroalgae          # bio-media algae, 9 items (CTK-041 2026-05-21)
    - Mangrove            # bio-media refugium plant, 1 item (CTK-041 2026-05-21)
    - Nano Fish           # fish, 22 items in Livestock (CTK-037 2026-05-10)
    - Non Reef Safe       # reef-safety rating family — fish gate per CTK-104 D-1 structural discriminator (2026-06-01)
    - Not Reef Safe       # reef-safety rating family — fish gate per CTK-104 D-1 structural discriminator (2026-06-01)
    - Predator            # reef-safety rating family — fish gate per CTK-104 D-1 structural discriminator (2026-06-01)
    - Reef Safe           # reef-safety rating family — fish gate per CTK-104 D-1 structural discriminator (2026-06-01)
    - Reef Safe Caution   # reef-safety rating family — fish gate per CTK-104 D-1 structural discriminator (2026-06-01)
    - Refugiums           # bio-media umbrella future-proof, 6 items (CTK-041 2026-05-21)
    - Tang                # fish, 33 items in Livestock (CTK-037 2026-05-10)
    - Tilefish            # fish (Purple Tilefish; defensive plural-tag-form coverage; CTK-095 Axis 2 2026-05-30)
    - Wrasse              # fish singular form (defensive; CTK-095 Axis 2 2026-05-30)
    - Wrasses             # fish plural form (Common Cleaner Wrasse; CTK-095 Axis 2 2026-05-30)
    - WYSIWYG Fish        # fish, 48 items in Livestock (CTK-037 2026-05-10)
  # CTK-107 D-2-tris (2026-06-01) close-gate eyeball-fail: 2 "Test Livestock"
  # rows (id 35385 + 35386, $0.51 + $None) — TSA vendor placeholder products
  # under product_type='Livestock' (in allowlist) + empty tags. Title-based
  # reject catches both + future Test/placeholder rows.
  title_denylist:
    - Test Livestock      # vendor test placeholder rows; catches "Test Livestock" + "Test Livestock Product" (CTK-107 D-2-tris 2026-06-01)
