# Austin Aqua Farms scraper config (CTK-149 Session 1).
#
# Authoritative platform/method fields live on the vendors row (migration
# 0061_add_austinaquafarms_vendor.sql, vendor_id=35). YAML carries scrape-tuning
# per arch §2.3 — values that may change without a code edit (delay, page size,
# max pages, hash anchor, originator prefix, category filter, cohort-OOS). DB row
# wins on conflict.
#
# Pure config clone of the Shopify fleet (PE/WWC/TSA/JF/Battlecorals/Unique
# Corals/Vivid/Reef Chasers/POTO/Cornbred/Williamson's/Reef Regeneration):
# parse_shopify carries the whole fetch/parse path. No shared-code edit.

slug: austinaquafarms
platform: shopify
base_url: https://austinaquafarms.com

# Standard Shopify endpoint; five-signal re-confirm at build 2026-06-28
# (platform can drift pre-flight 2026-06-12 -> build):
#   (1) homepage head carries window.Shopify (x51) / Shopify.shop / Shopify.theme
#       + cdn.shopify.com + myshopify references.
#   (2) powered-by: Shopify; server: cloudflare fronts a clean 200 (no JS
#       challenge / no cf-mitigated body signature; cf-cache-status DYNAMIC).
#   (3) no platform-deviation headers (standard Shopify behind Cloudflare).
#   (4) robots.txt explicit "# Shopify storefront. Public product, collection,
#       page, blog, policy, cart, and localized HTML is crawlable." preamble;
#       /products.json NOT disallowed (the only product-path Disallow is
#       /recommendations/products, a different endpoint). New-era agentic-commerce
#       posture present (agents.md, UCP discovery, UCP/MCP endpoint) scoped to
#       cart/checkout automation only — read-only catalog crawl of /products.json
#       is Allowed; our scraper reads catalog and never touches cart/checkout
#       (arch §2.5, no new ToS risk).
#   (5) /products.json HTTP 200 + canonical products array with the 13-key
#       first-product shape (body_html / created_at / handle / id / images /
#       options / product_type / published_at / tags / title / updated_at /
#       variants / vendor) matching the Shopify-fleet empirical anchor.
products_path: /products.json

# Page size at Shopify's max (250). Full-catalog walk 2026-06-28: 2303 products
# across 10 pages (pages 1-9 = 250 each, page 10 = 53 -> short-page terminator).
# This is the LARGEST catalog in the fleet by a wide margin (next is Williamson's
# 202). vendor field uniformly "Austin Aqua Farms" (1 distinct value across all
# 2303 rows).
page_size: 250

# Inherits the fleet empirical request_delay_sec=2 lock. 2303 products / 250 per
# page = 10 pages x 2s = ~20s total fetch time, still trivial vs. the 60-min
# workflow timeout. Bump to 3-4s per arch §2.4 retry-policy outcome only if 429s
# appear (the deepest fetch in the fleet, so the most 429-exposed — watch first).
request_delay_sec: 2

# Belt-and-suspenders ceiling. 2303-product catalog at 250/page = 10 pages today;
# 15 leaves ~50% headroom (1250 more rows / 5 pages) for drop-spike inventory
# without re-tuning. Higher than the small-catalog 5-cap posture
# (Battlecorals/UC/RC/Cornbred/Williamson's/Reef Regeneration) because AAF is the
# one genuinely multi-page fleet catalog — a 5-cap would TRUNCATE it at 1250 rows.
max_pages: 15

# Arch §2.6 Shopify variant: hash sorted key set of first product object. Same
# hash_anchor as the rest of the Shopify fleet per parse_shopify.py shape
# stability. Empirical anchor (Session 1 walk 2026-06-28): 13 keys = body_html,
# created_at, handle, id, images, options, product_type, published_at, tags,
# title, updated_at, variants, vendor.
hash_anchor: first_product_keys

# originator_prefix=null per Reef Chasers (CTK-086) / Cornbred (CTK-142) /
# Williamson's (CTK-146) / Reef Regeneration (CTK-148) precedent. AAF is a
# wild-import + aquaculture house (Australian/Indonesian "Premium"/"Ultra" wild
# imports + "Aquacultured Premium" house frags), NOT a named-coral originator
# whose trade names the seed-list attributes. The seed-list
# (.claude/research/named-coral-seed-list.md) has ZERO Austin-Aqua-Farms /
# AAF / "Austin" -attributed canonical entries (grep 2026-06-28), so matcher
# §3.4 stage-3 synthesis would be a no-op. null is the correct config; flip only
# on a future seed-list expansion that attributes canonicals to AAF.
originator_prefix: null

# cohort_oos_at_persist: true — trust-floor parity (CTK-105 D-4 lineage) + the
# fleet-wide default as of 2026-06-04. Net-new vendor, zero prior vendor_listings
# (migration 0061 lands the row in the same CTK), so the first scrape has no prior
# cohort -> zero would-flip rows (expected listings_oos ~0 on first scrape). The
# C2 first-scrape check is Δ catalog (0->2302 kept) ≈ listings_new (2302),
# listings_oos=0. Also auto-enrolls AAF in the health-digest cohort-OOS section
# (health_digest.py globs vendors/*.yaml and keys on this flag) — observability
# wired by config alone.
cohort_oos_at_persist: true

# auction_detection: OMITTED (None = no-op, parse_shopify.py permissive default).
# INV-05 is NOT triggered for Austin Aqua Farms. Full-catalog walk 2026-06-28
# (2303 rows, 10 pages — the FULL catalog, not a page-1 sample, per
# feedback_absence_diag_full_catalog_sweep, the exact gap that caught Cornbred at
# close) found ZERO auction signal: no wk_end_auction tag, no auc/bid tag
# substring anywhere, no product_type:Auction, no 'auction' in any title/handle.
# Re-confirm at any future re-walk; flip to an auction_detection block + flag
# /lead-backend if a wk_end_auction-style surface ever appears.

# category_filter — DELIBERATELY NO product_type_allowlist (CTK-149 #1,
# Jon-ratified 2026-06-28; same no-allowlist posture as Reef Regeneration CTK-148
# #1, sharpened by AAF's feed-relabel mode below). This absence is a DECISION, not
# an omission. Rationale, grounded in the full-catalog walk:
#
#   - AAF's product_type is NOT a coral taxonomy and NOT a coral/non-coral
#     discriminator. The walk found just THREE product_type buckets:
#         '' (empty)              = 2177   coral
#         'Animals & Pet Supplies' =  125   ALL CORAL (torches, mushrooms,
#                                           euphyllia) — a GOOGLE-MERCHANT-FEED
#                                           taxonomy value AAF's feed app stamps
#                                           on coral, NOT a non-coral signal.
#         'Gift Cards'            =    1   the ONLY non-coral row in 2303.
#     The pre-flight (2026-06-12, page-1 only) read "Animals & Pet Supplies" as
#     non-coral and the directive leaned "denylist it"; the full walk shows it is
#     125 real coral. Denylisting/allowlisting on product_type would invert into a
#     coral drop — exactly the page-1-sample failure feedback_absence_diag_full_
#     catalog_sweep exists to catch.
#   - FEED-RELABEL CATASTROPHE (the AAF-specific sharpener vs. RR): those
#     "Animals & Pet Supplies" values are a Google Shopping feed-app output. Such
#     apps can relabel product_type CATALOG-WIDE at any time (a more specific
#     Google category string). Under a product_type_allowlist like
#     ['', 'Animals & Pet Supplies'], a feed relabel would silently drop the
#     ENTIRE 2300-coral catalog to ZERO coverage — and the allowlist-miss WARN in
#     parse_shopify._should_keep is gated behind in_stock_only, which AAF does NOT
#     set (default False), so NO WARN/Slack alert fires. Worst-shape silent
#     failure. Under no-allowlist a PT relabel is a pure no-op (PT is ungated).
#   - The real coral taxonomy lives in TAGS (LPS Coral 1729, Soft Coral 425,
#     euphyllia 391, acans 347, mushroom 286, scolymia 188, goniopora 119, misc
#     98, chalice 94, favia 92, zoanthid 88, lobophyllia 85, Trachyphyllia 84,
#     duncan 66, SPS Coral 66, elegance 60, fungia 56, Acropora 48, bubble 47,
#     cynarina 42, leather 42, Blastomussa 35, alveopora 32, Clam 31,
#     dendrophyllia 24, Leather 18, Montipora 18, anemone 12, Toadstool 8,
#     Leptoseris 3 — 30 tags, EVERY one coral/livestock-native). But a
#     tag_allowlist is rejected too: 3 rows carry zero tags (2 Balanophyllia coral
#     + the gift card), so a tag_allowlist would drop the 2 zero-tag corals. With
#     only ONE non-coral row in the whole catalog, no allowlist axis earns its
#     silent-drop risk.
#   - Failure asymmetry (CTK-148 #1 logic): with no allowlist, novel non-coral
#     junk leaks VISIBLY (one wrong card on the site, caught by eyeball /
#     catalog-count drift watch, denylisted on sighting). With an allowlist, novel
#     coral (a new genus the feed app re-types, or a PT relabel) drops INVISIBLY —
#     lost coverage, the core moat, with no signal. Visible-junk-in beats
#     invisible-coral-out for a coverage-moat product.
#
# So the only gate is a title_denylist: the single gift card (its OWN line — AAF's
# one non-coral row) + the fleet-wide chaeto/macroalgae forward-bind (CTK-107
# D-2-quater per Jon's "filter chaeto from all vendors just to be safe" 2026-06-01).
# The gift card carries ZERO tags (and no row in the catalog carries any gift* tag),
# so a tag_denylist:[giftcard] is INERT here (Williamson's had a giftcard tag; AAF
# does not) — the title entry stands alone (Jon-confirmed 2026-06-28). A
# product_type_allowlist / tag_allowlist is rejected per the rationale above; new
# junk classes that appear later get added to this denylist on sighting
# (visible-leak posture).
#
# Residual leak risk + backstop: with no allowlist, ANY future non-coral AAF adds
# (equipment, a second gift-card SKU, apparel) leaks until denylisted. The backstop
# is scraper_runs.listings_seen catalog-count drift watch at /lead-backend
# per-vendor close-monitor + periodic re-walk (same rotating-bucket posture as
# Cornbred/Williamson's/Reef Regeneration, feedback_rotating_bucket_allowlist).
# There is no automatic new-junk signal (the WARN that would fire is allowlist-
# gated, and there is no allowlist) — the drift watch + re-walk + eyeball is the
# only backstop, accepted deliberately as the cost of not silently dropping coral.
# For AAF this backstop matters MORE than for any other vendor: it is the deepest
# catalog (2303 rows / 10 pages) AND the most feed-relabel-exposed, so the
# catalog-count drift watch is the primary observability for both a junk-leak and a
# relabel-induced coverage collapse.
category_filter:
  # title_denylist: case-insensitive substring per CTK-096 D-1. First entry =
  # AAF's single non-coral row; the rest = the fleet-wide chaeto/macroalgae
  # forward-bind (CTK-107 D-2-quater). It is AAF's ONLY junk gate, so kept
  # modestly generous on the macroalgae variants (canonical + misspelling +
  # hyphen + spacing). The chaeto entries fire on ZERO rows in the locked
  # 2026-06-28 walk (AAF stocks no macroalgae today) — pure forward-bind; only
  # the "Gift Card" entry fires (1 row).
  title_denylist:
    - Gift Card              # "Austin Aqua Farms Gift Card" — the catalog's lone non-coral row (zero tags; title-only, 2026-06-28)
    - Chaeto                 # canonical + Chaetomorpha substring catch (forward-bind)
    - Cheato                 # POTO-style misspelling forward-binding
    - Macroalgae             # generic macroalgae catch (forward-bind)
    - Macro Algae            # space-separated variant catch (forward-bind)
    - Macro-Algae            # hyphenated variant catch (forward-bind)
