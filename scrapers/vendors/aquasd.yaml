# AquaSD scraper config (CTK-090 Session 1). BigCommerce Stencil — first v1
# consumer of scrapers/common/parse_bigcommerce.py per architecture-v1.md
# decision register row #66. Authoritative platform/method fields live on
# the vendors row (migration 0015_add_aquasd_vendor.sql, vendor_id=7); YAML
# carries scrape-tuning per arch §2.3. DB row wins on conflict.

slug: aquasd
platform: bigcommerce
base_url: https://aquasd.com

# Five-signal BigCommerce Stencil confirmation pre-flight (CTK-085 Session
# 1c 2026-05-25 + CTK-090 Session 1 2026-05-26):
#   (1) <meta name='platform' content='bigcommerce.stencil'> in head
#   (2) window.bodl payload with store_id:1003469308
#   (3) CDN URL shape cdn11.bigcommerce.com/s-cylmob5x9n
#   (4) .php-shape robots.txt
#   (5) /products.json HTTP 404 (Shopify endpoint absent)
# Additional probe: /graphql POST returned "credentials were missing, no
# token sent" — Storefront GraphQL API rejected for v1 per decision #66.

# Coral genus paths per AquaSD homepage nav grep 2026-05-26. 21 paths;
# taxonomic partitioning is biologically stable (genus paths don't rotate
# content the way Shopify product_type buckets can).
#
# Selected from full AquaSD nav (41 single-segment paths) by coral-scope
# filter — site-org paths (/contact-us, /info, /finder, /more, /gift-cards,
# /shipping-modules, /dry-goods), non-coral livestock (/fish, /inverts),
# algae (/macro-algae), aggregator buckets (/frag-packs, /multiples-
# available, /new-arrivals, /new-arrivals-v2, /clearance), and overlapping
# parent rollups (/sps, /lps, /corals, /other-lps) excluded.
#
# Overlap-pair note: /softies/ ∩ /zoanthids/ = 57 cards observed on
# 2026-05-26 page-1 probe — deduped at parser layer (parse_bigcommerce
# .fetch_and_parse end-of-function dedup by product_url, first-seen wins).
# vendor_listings UNIQUE (vendor_id, product_url) prevents the duplicate
# insert at persist, but price_history is append-only and would otherwise
# carry two rows per overlap product per scrape forever — the parser-side
# dedup keeps both the catalog uniqueness AND the append-only price-history
# contract aligned. Cost is ~2 extra HTTP round-trips per scrape vs picking
# one; benefit is no coverage gap on the 7 cards unique to each side.
# Original (CTK-090 Session 1) claim that diff.py absorbed this naturally
# was corrected at Session 4 /code-review fold-batch 2026-05-27.
#
# /wysiwyg/ enumerated in CTK-090 Session 0 plan §Context was a Shopify-
# vendor-pattern false carry; HTTP 404 on probe 2026-05-26 — does not
# exist on AquaSD. /auctions/ surface is a third-party eBay-API JS widget
# (zero data-product-id cards, "No active eBay auctions found right now."
# JS fallback), not a BC catalog page — deferred to future-CTK Playwright
# /eBay-API integration per CTK-090 Session 1 disposition.
category_paths:
  - /acans/
  - /acanthos/
  - /acropora/
  - /anemones/
  - /blastos/
  - /chalices/
  - /clams/
  - /cynarinas/
  - /elegances/
  - /euphyllia/
  - /favias/
  - /fungias-plates/
  - /gonis-alves/
  - /lobos/
  - /montipora/
  - /mushrooms/
  - /scolys/
  - /softies/
  - /wellsos-and-trachys/
  - /wilsonis/
  - /zoanthids/

# Pagination shape: ?page=N. Stencil default page size 64 cards; overshoot
# pages return HTTP 404 (parse_bigcommerce break terminator). Per-page
# fetch checks 404 status BEFORE error_class so the 404 doesn't fail the
# scrape — natural pagination end on BC.
pagination: '?page={n}'

# Belt-and-suspenders ceiling. AquaSD's largest genus bucket on 2026-05-26
# probe was /acropora/ at 64 cards/page; estimated full catalog ~10 pages.
# 30 leaves ample headroom for catalog growth without re-tuning.
max_pages: 30

# Per-category floor — opt-in WARN. parse_bigcommerce logs a grep-friendly
# WARN when any single category produces fewer items than this threshold
# across the full pagination sweep; items still persist and the run
# finalizes status='success'. Was a fatal SchemaChangeError until CTK-090
# Session 7 2026-05-29 downgrade — live /cynarinas/ probe found 1 in-stock
# product (no empty-state marker, because a product IS present), which
# would have red-flagged scheduled runs and spammed ops. Genuine single-
# category template breaks (BC Stencil supports per-category overrides via
# `category-<id>.html`) are already loud-failed elsewhere: cards-present-
# all-skipped in _parse_one_page (finding #2/#7), the all-categories-empty
# raise at fetch_and_parse bottom (fires only when EVERY category is
# empty), the §2.6 html_hash sentinel. The count heuristic was always an
# observability signal, not a distinct failure mode — WARN keeps the
# signal without the false fatal (mirrors CTK-088 POTO buyable-drop WARN
# precedent). 3 tuned at Session 6b 2026-05-27 per small-genera empirical
# probe — Session 4's "5 lean default" was set on n=1 /acropora/-shape
# sample without exercising the small-bucket tail; /cynarinas/=4 (1 at
# 2026-05-29 live probe) + /scolys/=8 + 3 marker-empty paths (/wilsonis/,
# /elegances/, /wellsos-and-trachys/) surfaced via 2026-05-27 probe post-
# Session-6 marker carve-out land. Threshold 3 keeps the per-category
# drift signal (5+ → 0/1/2 transition still WARNs) while accommodating
# AquaSD's legitimate low-stock genera. Marker carve-out absorbs the
# legitimate-empty case separately. Per-genus override path is a future
# yaml field if a real-world catalog rotates a path below 3 in normal
# operation; not implemented at v1 launch.
# Note: the same WARN message text fires on BOTH legitimate sparse single-
# genus inventory (e.g., /cynarinas/=1) AND theme-drift 5+→1 transitions.
# Signal discrimination requires per-path history; deferred to CTK-094.
expected_min_per_category: 3

# Polite default. 21 paths × ~3 pages average × 2s = ~125s/scrape —
# comfortably under the 10-min workflow ceiling. Bump to 3-4s per arch
# §2.4 retry-policy outcome only if 429s appear in observation window.
request_delay_sec: 2

# Arch §2.6 BC Stencil variant: first li.product outer HTML with text +
# non-class attributes stripped (tags + class attrs only). Theme-engine
# template-stable across Stencil stores per decision #66 rationale.
# Anchor pin: first card of first non-empty iterated category_paths
# entry (YAML list order = iteration order = deterministic across runs).
hash_anchor: first_card_skeleton

# Silent-OOS gap (probe 2026-05-26): Stencil hides OOS items from category
# view — zero out-of-stock markers across /acropora/, /sps/, /lps/ page-1
# 64-card sweeps. All parsed cards land in_stock=True at parse layer.
#
# Coverage gap: OOS-via-disappearance is not currently surfaced by
# diff.classify (items absent from scrape aren't iterated; existing DB
# rows stay at last-seen in_stock value). Frontend may show stale "in
# stock" badges on items long delisted. Flag for /lead-backend Q-N
# disposition — sibling-CTK or open-items.md entry for cohort-based OOS
# detection at persist time. Workaround until then: AquaSD's OOS transit
# is silently dropped from the diff; first-seen + price-changed +
# restocked still work correctly.

# auction_detection — ABSENT from this config. AquaSD's /auctions/ surface
# is out of v1 scope (eBay widget, JS-rendered). parse_bigcommerce's
# auction_detection plumbing is permissive-default no-op when config
# block is missing (mirrors parse_shopify None=no-op shape). Future BC
# vendor with a literal-URL auction subpath adds the block:
#   auction_detection:
#     category_paths: ['/auctions/']

# originator_prefix — null at v1 launch. AquaSD's catalog carries "ASD "
# prefix shape on house-named lineages observed in 2026-05-26 probe
# (e.g., "ASD Rainbow Mille", "ASD Rainbow Tenuis Acropora", "ASD
# Rainbow Fusion Tenuis"). Whether to set originator_prefix to 'asd'
# depends on whether named-coral-seed-list.md carries ASD-attributed
# canonical entries that would benefit from matcher §3.4 stage 3
# synthesis. Defaults to null (PE precedent — no synthesis amplification);
# flag for /lead-backend Q-N at seed-list review.

# image_strategy inherits from vendors row (mirror per default + decision
# #52). Runtime-flippable to 'hotlink' on vendor pushback via UPDATE,
# no code commit.

# category_filter — ABSENT. BigCommerce Stencil cards have no Shopify-
# equivalent product_type field for allowlist gating; category_paths IS
# the filter (only coral-genus paths included by selection). Rotating-
# bucket risk is bounded — AquaSD's genus taxonomy is biologically stable.
