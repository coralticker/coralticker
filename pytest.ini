[pytest]
# CTK-039 Phase 1 CI test config. Minimal — testpaths + marker registration
# only. No fixture / plugin / conftest scaffolding at this phase scope.
#
# Note on test-file shape: the 9 modules under scrapers/tests/ use plain
# `assert` + `if __name__ == "__main__":` driver blocks; pytest collects
# the module-level `def test_*` functions regardless. Script-mode local
# invocation (`python -m scrapers.tests.test_<x>`) and pytest-mode
# invocation coexist without conflict — pytest only invokes `test_*`
# functions directly, not the driver block under `if __name__ == "__main__":`.

testpaths = scrapers/tests
markers =
    requires_db: marks tests requiring live hosted Supabase (skipped in CI per CTK-039 D1)
