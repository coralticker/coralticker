name: pacific-east

on:
  # CTK-033 pause — un-comment at reactivation post-verify-pass. Slack-noise halt during
  # the URL-extract repair cycle: every fast-fail vendor inactive run was firing the
  # if: failure() Slack alert (~48 alerts/day across PE+WWC since 2026-05-05 14:33Z).
  # Symmetric to the data-layer pause (active=false); both un-pause together at CTK-033 close.
  # schedule:
  #   - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scrape:
    runs-on: ubuntu-latest
    # 60-min cap per CTK-024 Session 2 fix. First-run image-mirror loop on PE's
    # 2500-3000 listings × ~500-600ms per mirror() = 21-30 min just for Phase B
    # (Phase A data writes finish in 1-2 min). Steady-state daily runs (handful
    # of new arrivals + Phase B catch-up for prior NULL image_url rows) finish
    # in under 2 min. 60 absorbs first-run + future catalog growth without
    # re-tuning. Arch §2.7's 10-min default stands as the typical-cadence
    # ceiling; 60 is the CTK-024 first-scraper carve-out.
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scrapers/requirements.txt

      - name: Install dependencies
        run: pip install -r scrapers/requirements.txt

      - name: Run Pacific East scraper
        id: scrape
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python -m scrapers.common.run pacific_east

      - name: Cleanup stale running rows
        if: always()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python -m scrapers.common.run pacific_east --cleanup

      - name: Slack alert on failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -sS -X POST -H 'Content-Type: application/json' \
            --data "{\"text\": \"pacific-east scraper failed: ${RUN_URL}\"}" \
            "${SLACK_WEBHOOK_URL}"
