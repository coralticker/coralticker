name: aquasd

on:
  schedule:
    # CTK-090 cadence lock per plan §Scope item 7 + arch §2.7 decision #15
    # + .claude/open-items.md L53 off-minute discipline.
    #
    # 47 9 * * * UTC = 4:47am EST / 5:47am EDT — early-morning ET. EDT half-
    # year (Mar-Nov) fires just outside the strict 03-05 ET window but still
    # off-peak; intent is daily-cadence overnight, not strict 03-05 enforcement.
    # 47-minute off-minute per L53 top-of-hour degradation discipline
    # (2026-05-12 incident).
    #
    # AquaSD is daily-cadence ('daily' cadence_label per vendor_id=7 vendors
    # row). No drop-day-aware second-workflow path (AquaSD doesn't have an
    # announced-drop-day pattern at vendor-scan §6 — SPS / LPS / softie /
    # zoa listings flow continuously across 21 genus paths, not in event-
    # drop bursts).
    #
    # Runner-contention note: Battlecorals fires at 8:23 UTC (daily); AquaSD
    # at 9:47 UTC spreads the daily-cadence band so the two don't share the
    # runner pool simultaneously. Bump to 17 10 * * * UTC available at
    # /lead-backend judgment call if other daily-cadence vendors crowd the
    # 9:00-9:59 UTC band.
    - cron: '47 9 * * *'
  workflow_dispatch:

permissions:
  contents: read

# Concurrency: queue (don't cancel) per JF cascade-repair shape (CTK-027
# 2026-05-08 disposition) + Phase 2 vendor ship-with-explicit-block convention
# (Battlecorals + Unique Corals precedent).
#
# (a) cancel-in-progress: false rationale — operator-trigger landing during
#     in-flight cron fire queues behind the running fire (≤60-min latency
#     given timeout-minutes: 60). Cancelling would risk truncating a running
#     Phase B mirror loop mid-write — vendor_listings / price_history / R2
#     image-mirror double-write avoidance. Block also resolves GH-Actions-
#     default silent-drop behavior on workflow_dispatch overlap (open-items.md
#     L50 schedule-suppression) — explicit group converts silent-drop into
#     queue-with-pending-replacement; queue depth never exceeds 1 at AquaSD's
#     expected ~125s scrape time (21 paths × ~3 pages × 2s) + Phase B mirror.
concurrency:
  group: aquasd-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    # 60-min cap inherits Phase 1 + Phase 2 vendor carve-out. AquaSD scrape
    # estimate: 21 category_paths × ~3 pages avg × 2s request_delay = ~125s
    # Phase A; Phase B image-mirror scales with NEW count (first-run mirror
    # absorbs full catalog at ~500-600ms/image, ~10 min for ~1300-product
    # estimated full catalog). Steady-state daily fires finish in <5 min
    # total. 60 absorbs first-run + catalog growth headroom.
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scrapers/requirements.txt

      - name: Install dependencies
        run: pip install -r scrapers/requirements.txt

      - name: Preflight NEON_DATABASE_URL
        uses: ./.github/actions/preflight-neon-secret
        env:
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}

      - name: Run AquaSD scraper
        id: scrape
        env:
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: python -m scrapers.common.run aquasd

      - name: Cleanup stale running rows
        if: always()
        env:
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
        run: python -m scrapers.common.run aquasd --cleanup

      - name: Slack alert on failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -sS -X POST -H 'Content-Type: application/json' \
            --data "{\"text\": \"aquasd scraper failed: ${RUN_URL}\"}" \
            "${SLACK_WEBHOOK_URL}"
