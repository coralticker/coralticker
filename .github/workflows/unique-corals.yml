name: unique-corals

on:
  schedule:
    # CTK-085 cadence lock per plan §Scope L57-58 + arch §2.7 decision #15
    # + .claude/open-items.md L53 off-minute discipline.
    #
    # 29 * * * * UTC = every hour at :29 minutes past — off-minute lock per
    # L53 top-of-hour degradation discipline (2026-05-12 incident anchored
    # the off-minute rule; :00 cron slots silently degrade under GH Actions
    # free-tier scheduled-workflow load peaks).
    #
    # Unique Corals is hourly-cadence ('hourly' cadence_label per vendor_id=6
    # vendors row). Hourly-only v1 ship per Q-2 disposition (CTK-085 plan
    # §Decisions): Phase 2.5 event-aware overlay CTK deferred-with-trigger,
    # not inherited CTK-026 D3 30-min Monday Flash Sale overlay without
    # empirical drop-density evidence. Trigger = 2-3 Monday Flash Sales
    # observations post-ship (likely first empirical window 2026-06-01+).
    #
    # Runner-contention note: :29 off-minute is distinct from CTK-027 JF
    # (:07), CTK-026 TSA (:13), CTK-025 WWC (:19), CTK-024 PE (no hourly).
    # All four hourly-cadence vendors fire on distinct minutes within the
    # hour to spread GH Actions runner-pool load.
    - cron: '29 * * * *'
  workflow_dispatch:

permissions:
  contents: read

# Concurrency: queue (don't cancel) per JF cascade-repair shape (CTK-027
# 2026-05-08 disposition). Phase 2 vendors ship with explicit concurrency
# blocks from day one; latent PE/WWC/TSA gap stays parked at open-items.md
# L51 as separate sub-CTK hygiene per CTK-085 plan §Out of scope.
#
# (a) cancel-in-progress: false rationale — operator-trigger landing during
#     in-flight cron fire queues behind the running fire. Cancelling would
#     risk truncating a running Phase B mirror loop mid-write —
#     vendor_listings / price_history / R2 image-mirror double-write
#     avoidance. Block also resolves GH-Actions-default silent-drop behavior
#     on workflow_dispatch overlap (open-items.md L50 schedule-suppression)
#     — explicit group converts silent-drop into queue-with-pending-
#     replacement. Hourly cadence (24 fires/day) at UC's 524-product catalog
#     scale (~6s parse + Phase B mirror loop) means queue depth never
#     meaningfully accumulates.
concurrency:
  group: unique-corals-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    # 60-min cap inherits PE+WWC+TSA+JF+Battlecorals Phase 1+2 carve-out.
    # UC's 524-product catalog at ~500-600ms per mirror = ~5-6 min Phase B
    # max on first cold-start run; steady-state hourly fires (handful of new
    # + Phase B catch-up for prior NULL image_url rows) finish in under 2
    # min. Substantial headroom inside the 60-min ceiling; first-run image
    # mirror absorbed cleanly inside a single fire (no 2-fire span needed
    # at UC scale). 60 absorbs first-run + future catalog growth.
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scrapers/requirements.txt

      - name: Install dependencies
        run: pip install -r scrapers/requirements.txt

      - name: Run Unique Corals scraper
        id: scrape
        env:
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: python -m scrapers.common.run unique_corals

      - name: Cleanup stale running rows
        if: always()
        env:
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
        run: python -m scrapers.common.run unique_corals --cleanup

      - name: Slack alert on failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -sS -X POST -H 'Content-Type: application/json' \
            --data "{\"text\": \"unique-corals scraper failed: ${RUN_URL}\"}" \
            "${SLACK_WEBHOOK_URL}"
