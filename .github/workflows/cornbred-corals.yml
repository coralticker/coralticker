name: cornbred-corals

on:
  schedule:
    # CTK-142 cadence lock per arch §2.7 decision #15 + open-items.md
    # off-minute discipline.
    #
    # 47 * * * * UTC = every hour at :47 minutes past — off-minute lock per
    # the top-of-hour degradation discipline (:00 cron slots silently degrade
    # under GH Actions free-tier scheduled-workflow load peaks; empirical
    # evidence in open-items.md L60: a :23 slot fired 3h26m late under
    # top-of-hour-cluster degradation).
    #
    # Cornbred is hourly-cadence ('hourly' cadence_label per vendor_id=12
    # vendors row). Hourly per the Phase 2 vendor-wave default: Cornbred adds
    # rolling new-corals + weekend-auction (wk_end_auction) inventory; same
    # posture as the rest of the Shopify fleet.
    #
    # Runner-contention note: :47 is a clean off-minute singleton — no co-fire
    # neighbor within a 5-minute spread. Existing fleet minutes: WWC/TSA/JF :00
    # (top-of-hour cluster; off-minute migration pending per open-items.md
    # L53), Vivid :19, BC :23 (daily), UC :29, PE :37, RC :41, AquaSD :47
    # (daily). AquaSD also fires at :47 but on a DAILY cadence — the only
    # genuine same-minute overlap is the once-per-day AquaSD fire, a single
    # co-fire vs. Cornbred's 24 hourly fires; no sustained runner contention.
    - cron: '47 * * * *'
  workflow_dispatch:

permissions:
  contents: read

# Concurrency: queue (don't cancel) per the JF cascade-repair shape (CTK-027
# 2026-05-08 disposition). Phase 2 vendors ship with explicit concurrency
# blocks from day one.
#
# cancel-in-progress: false rationale — an operator-trigger landing during an
# in-flight cron fire queues behind the running fire. Cancelling would risk
# truncating a running Phase B mirror loop mid-write (vendor_listings /
# price_history / R2 image-mirror double-write avoidance). The block also
# resolves GH-Actions-default silent-drop behavior on workflow_dispatch
# overlap (open-items.md L50 schedule-suppression) — the explicit group
# converts silent-drop into queue-with-pending-replacement. Hourly cadence
# (24 fires/day) at Cornbred's 648-product catalog scale (~6s parse + Phase B
# mirror loop) means queue depth never meaningfully accumulates.
concurrency:
  group: cornbred-corals-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    # 60-min cap inherits the Phase 1+2 Shopify-fleet carve-out. Cornbred's
    # 648-product catalog at ~500-600ms per mirror = ~5-6 min Phase B max on
    # the first cold-start run; steady-state hourly fires finish in under 1 min.
    # Substantial headroom inside the 60-min ceiling; first-run image mirror
    # absorbed cleanly inside a single fire at Cornbred scale.
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scrapers/requirements.txt

      - name: Install dependencies
        run: pip install -r scrapers/requirements.txt

      - name: Preflight NEON_DATABASE_URL
        uses: ./.github/actions/preflight-neon-secret
        env:
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}

      - name: Run Cornbred Corals scraper
        id: scrape
        env:
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: python -m scrapers.common.run cornbred

      - name: Cleanup stale running rows
        if: always()
        env:
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
        run: python -m scrapers.common.run cornbred --cleanup

      - name: Slack alert on failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -sS -X POST -H 'Content-Type: application/json' \
            --data "{\"text\": \"cornbred-corals scraper failed: ${RUN_URL}\"}" \
            "${SLACK_WEBHOOK_URL}"
