name: discord-digest

# CTK-011 — daily drop digest to the public Discord #drops channel.
# CTK-218 — this workflow now ALSO sends the daily EMAIL digest as an
# independent step. On Vercel Hobby only the first cron in vercel.json is
# actually scheduled, so the standalone /api/cron/email-digest cron never
# fired (silent miss). Both channels now ride this one daily dispatch.
#
# Trigger is Vercel cron, not GH schedule (CTK-011 cron-reliability
# amendment 2026-06-07): the first two GH scheduled fires landed +2h49m and
# +1h33m late (best-effort cron; open-items.md "Discord-digest cron-delay
# watch", escalation fired 2026-06-06). Vercel cron hits
# app/api/cron/discord-digest/route.ts daily at 13:00 UTC, which dispatches
# this workflow via the GitHub API. Single-trigger ownership: do NOT re-add
# a schedule block here — two triggers means double-posting to #drops AND a
# double email send.
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Render the digest in the step log without posting'
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: discord-digest
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 11

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      # --prod (/code-review #8 fold): the script's runtime closure is
      # @neondatabase/serverless + two lib/ files — Next/React/eslint dev
      # tooling is dead weight on a daily POST job.
      - name: Install dependencies
        run: pnpm install --prod --frozen-lockfile

      - name: Preflight NEON_DATABASE_URL
        uses: ./.github/actions/preflight-neon-secret
        env:
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}

      - name: Post daily Discord digest
        id: discord
        env:
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: node --experimental-strip-types scripts/discord-digest.ts ${{ inputs.dry_run && '--dry-run' || '' }}

      # Per-channel failure alert (CTK-218), scoped to the Discord step's own
      # outcome so it never fires for an email-step failure. Routes to the
      # operator channel (Slack), not Discord — decision #39 operator/user split.
      # A silent digest gap on #drops is exactly the empty-room failure shape
      # CTK-011's risks call out.
      - name: Slack alert on Discord failure
        if: ${{ failure() && steps.discord.outcome == 'failure' }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -sS -X POST -H 'Content-Type: application/json' \
            --data "{\"text\": \"discord-digest failed: ${RUN_URL}\"}" \
            "${SLACK_WEBHOOK_URL}"

      # CTK-218 — the EMAIL digest, an INDEPENDENT step on the same dispatch.
      # Gated so a Discord hard-fail does NOT skip the email send (the two channels
      # share a trigger, not a fate), WITHOUT firing on a broken environment (F2):
      # a failed shared setup step (checkout / setup-node / pnpm install / preflight)
      # SKIPS the Discord step, so `discord.outcome != 'skipped'` keeps email from
      # running — and thus from raising a spurious "email-digest failed" that
      # mis-attributes shared-infra failure to the email channel. !cancelled() drops
      # it on a cancelled run. A genuine Discord POST failure leaves outcome='failure'
      # (not 'skipped'), so email still rides past it. Runs the same runEmailDigest()
      # the manual re-fire + cron route call; the fire-once guard makes a same-day
      # double-dispatch a no-op. RESEND_API_KEY rides this step's env; never echoed.
      - name: Send daily email digest
        id: email
        if: ${{ !cancelled() && steps.discord.outcome != 'skipped' }}
        env:
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: node --experimental-strip-types scripts/run_email_digest.ts ${{ inputs.dry_run && '--dry' || '' }}

      # Per-channel failure alert (CTK-218), scoped to the email step's own outcome
      # so it names the EMAIL channel — not reusing the Discord alert above.
      # always()-gated so it evaluates even when the Discord step already failed.
      - name: Slack alert on email failure
        if: ${{ always() && steps.email.outcome == 'failure' }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -sS -X POST -H 'Content-Type: application/json' \
            --data "{\"text\": \"email-digest failed: ${RUN_URL}\"}" \
            "${SLACK_WEBHOOK_URL}"
